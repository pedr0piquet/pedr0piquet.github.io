<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Avisar Porteiro</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="card">

  <div class="header">
    <h1>Avisar porteiro</h1>
    <p>Preencha os dados do Uber</p>
  </div>

  <div class="fields">
    <div class="field">
      <label>Nome do motorista</label>
      <input type="text" id="nome" placeholder="Ex: João" autocomplete="off" />
    </div>

    <div class="field">
      <label>Número da casa / apto</label>
      <input type="text" id="num" placeholder="Ex: 42" autocomplete="off" />
    </div>

      <div class="row">
    <div class="field">
      <label>Marca</label>
      <select id="marca" onchange="onMarcaChange()">
        <option value="">Selecione</option>
        <option value="Fiat">Fiat</option>
        <option value="Volkswagen">Volkswagen</option>
        <option value="Chevrolet">Chevrolet</option>
        <option value="Toyota">Toyota</option>
        <option value="Hyundai">Hyundai</option>
        <option value="Nissan">Nissan</option>
        <option value="Renault">Renault</option>
        <option value="outro">Outro...</option>
      </select>
      <input type="text" id="marca-outro" class="outro-input" placeholder="Digite a marca" autocomplete="off" />
    </div>

  <div class="field">
    <label>Modelo</label>
    <select id="modelo" disabled onchange="onModeloChange()">
      <option value="">Selecione a marca</option>
    </select>
    <input type="text" id="modelo-outro" class="outro-input" placeholder="Digite o modelo" autocomplete="off" />
  </div>

    <div class="field">
      <label>Cor</label>
      <input type="text" id="cor" placeholder="Ex: Prata" autocomplete="off" />
    </div>

    <div class="field">
      <label>ETA <span class="optional-tag">(opcional)</span></label>
      <input type="text" id="eta" placeholder="Ex: 5 minutos" autocomplete="off" />
    </div>
  </div>

  <div class="preview" id="preview"></div>

  <button class="btn-whatsapp" onclick="enviar()">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
      <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
    </svg>
    Enviar no WhatsApp
  </button>

  <p class="erro" id="erro">Preencha todos os campos obrigatórios.</p>

</div>

</div>
<script>
  // ─── CONFIGURAÇÃO ─────────────────────────────────────────────────────────
  // Troque pelo número do porteiro com DDI (só números, sem espaços ou sinais)
  const NUMERO_PORTEIRO = "5521970785219";

  // Adicione o carro que quiser
  const CARROS = {
  "Fiat":       ["Argo", "Cronos", "Grand Siena", "Mobi"],
  "Volkswagen": ["Fox", "Polo", "Virtus"],
  "Chevrolet":  ["Onix", "Onix Plus"],
  "Toyota":     ["Corolla", "Yaris"],
  "Hyundai":    ["HB20", "HB20S"],
  "Nissan":     ["Kicks", "Versa"],
  "Renault":    ["Kwid", "Logan"]
};
  // ──────────────────────────────────────────────────────────────────────────

  function onMarcaChange() {
    const marcaSelect  = document.getElementById('marca');
    const marcaOutro   = document.getElementById('marca-outro');
    const modeloSelect = document.getElementById('modelo');
    const modeloOutro  = document.getElementById('modelo-outro');
    const val          = marcaSelect.value;

    // toggle "outro" text input for marca
    marcaOutro.style.display = val === 'outro' ? 'block' : 'none';

    // reset modelo
    modeloSelect.innerHTML = '';
    modeloOutro.style.display = 'none';
    modeloSelect.style.display = 'block';

    if (val === '') {
        modeloSelect.innerHTML = '<option value="">Selecione primeiro a marca</option>';
        modeloSelect.disabled = true;
    } else if (val === 'outro') {
        modeloSelect.style.display = 'none';
        modeloOutro.style.display = 'block';
    } else {
      modeloSelect.disabled = false;
      modeloSelect.innerHTML = '<option value="">Selecione</option>';
      CARROS[val].forEach(m => {
        const opt = document.createElement('option');
        opt.value = m;
        opt.textContent = m;
        modeloSelect.appendChild(opt);
      });
      // add "Outro..." at the end
      const outro = document.createElement('option');
      outro.value = 'outro';
      outro.textContent = 'Outro...';
      modeloSelect.appendChild(outro);
    }

    updatePreview();
  }

  function onModeloChange() {
    const modeloSelect = document.getElementById('modelo');
    const modeloOutro  = document.getElementById('modelo-outro');
    modeloOutro.style.display = modeloSelect.value === 'outro' ? 'block' : 'none';
    updatePreview();
  }

  // returns the effective value of a select, falling back to its "outro" input
  function getVal(selectId, outroId) {
    const sel = document.getElementById(selectId);
    if (!sel) return document.getElementById(outroId).value.trim();
    return sel.value === 'outro'
      ? document.getElementById(outroId).value.trim()
      : sel.value;
  }

  function buildMsg() {
    const nome  = document.getElementById('nome').value.trim();
    const num   = document.getElementById('num').value.trim();
    const marca = document.getElementById('marca').value === 'outro'
      ? document.getElementById('marca-outro').value.trim()
      : document.getElementById('marca').value;
    const modeloSelect = document.getElementById('modelo');
    const modelo = modeloSelect.style.display === 'none'
      ? document.getElementById('modelo-outro').value.trim()
      : (modeloSelect.value === 'outro'
          ? document.getElementById('modelo-outro').value.trim()
          : modeloSelect.value);
    const cor   = document.getElementById('cor').value.trim();
    const eta   = document.getElementById('eta').value.trim();

    if (!nome && !num && !marca && !modelo && !cor) return null;

    let msg = `O uber ${nome || '[nome]'} vai entrar para a casa ${num || '[num]'} num ${marca || '[marca]'} ${modelo || '[modelo]'} ${cor || '[cor]'}`;
    if (eta) msg += ` em aproximadamente ${eta} minutos`;
    msg += '.';
    return msg;
  }

  function updatePreview() {
    const msg     = buildMsg();
    const preview = document.getElementById('preview');
    if (msg) {
      preview.textContent = msg;
      preview.style.display = 'block';
    } else {
      preview.style.display = 'none';
    }
  }

  ['nome', 'num', 'cor', 'eta', 'marca-outro', 'modelo-outro'].forEach(id => {
    document.getElementById(id).addEventListener('input', updatePreview);
  });

  function enviar() {
    const nome  = document.getElementById('nome').value.trim();
    const num   = document.getElementById('num').value.trim();
    const marca = document.getElementById('marca').value === 'outro'
      ? document.getElementById('marca-outro').value.trim()
      : document.getElementById('marca').value;
    const modeloSelect = document.getElementById('modelo');
    const modelo = modeloSelect.style.display === 'none'
      ? document.getElementById('modelo-outro').value.trim()
      : (modeloSelect.value === 'outro'
          ? document.getElementById('modelo-outro').value.trim()
          : modeloSelect.value);
    const cor  = document.getElementById('cor').value.trim();
    const erro = document.getElementById('erro');

    if (!nome || !num || !marca || !modelo || !cor) {
      erro.style.display = 'block';
      return;
    }

    erro.style.display = 'none';
    const msg = buildMsg();
    window.open(`https://wa.me/${NUMERO_PORTEIRO}?text=${encodeURIComponent(msg)}`, '_blank');
  }
</script>
</body>
</html>
